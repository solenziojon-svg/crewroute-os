# railway.toml - CrewRoute Empire OS Backend
[build]
builder = "NIXPACKS"
buildCommand = "pip install -r requirements.txt"

[deploy]
startCommand = "python3 empire_ai_nexus.py serve"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[env]
PYTHONUNBUFFERED = "1"
PORT = "8080"

# === Required Environment Variables (set in Railway dashboard) ===
# SUPABASE_URL=
# SUPABASE_KEY=
# CLAUDE_API_KEY=
# TELEGRAM_BOT_TOKEN=
# GOOGLE_MAPS_API_KEY=